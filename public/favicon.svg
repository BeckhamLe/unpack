<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="15" fill="#111111" stroke="#E6A329" stroke-width="1"/>
  <!-- Open box bottom -->
  <polygon points="7,20 16,24 25,20 25,17 16,21 7,17" fill="#E6A329" opacity="0.6"/>
  <!-- Box left flap -->
  <polygon points="7,17 7,14 11,12 11,16" fill="#E6A329" opacity="0.4"/>
  <!-- Box right flap -->
  <polygon points="25,17 25,14 21,12 21,16" fill="#E6A329" opacity="0.4"/>
  <!-- Slide 1 (back) -->
  <rect x="10" y="5" width="8" height="6" rx="0.5" fill="#E6A329" opacity="0.5" transform="rotate(-8, 14, 8)"/>
  <!-- Slide 2 (middle) -->
  <rect x="12" y="4" width="8" height="6" rx="0.5" fill="#E6A329" opacity="0.75" transform="rotate(0, 16, 7)"/>
  <!-- Slide 3 (front) -->
  <rect x="14" y="5" width="8" height="6" rx="0.5" fill="#E6A329" opacity="1" transform="rotate(8, 18, 8)"/>
</svg>
